<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTLYST – Login Vorschau</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.10em;
      background: linear-gradient(135deg, #000000 0%, #888888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub {
      font-size: 13px;
      color: #86868b;
      margin-top: 6px;
    }

    /* Card */
    .card {
      background: #ffffff;
      border: 1px solid #000000;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* Tab switcher */
    .tabs {
      display: flex;
      gap: 4px;
      background: #f5f5f7;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .tab.active {
      background: #ffffff;
      color: #1d1d1f;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }
    .tab.inactive {
      background: transparent;
      color: #86868b;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-group:last-of-type { margin-bottom: 24px; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: #6e6e73;
      display: block;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 11px 14px;
      color: #1d1d1f;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    input:focus {
      border-color: #000;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    input::placeholder { color: #aeaeb2; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 12px 0;
      background: linear-gradient(135deg, #000000, #555555);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s ease;
    }
    .btn-submit:hover { opacity: 0.88; }

    /* Divider + demo */
    .divider {
      height: 1px;
      background: #f2f2f2;
      margin: 18px 0 16px;
    }
    .demo-link {
      display: block;
      text-align: center;
      background: transparent;
      border: none;
      font-size: 13px;
      color: #86868b;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
    }
    .demo-link:hover { color: #1d1d1f; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #aeaeb2;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="logo-area">
      <div class="logo-text">INTLYST</div>
      <div class="logo-sub">Intelligente Business-Analyse</div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active">Anmelden</button>
        <button class="tab inactive">Registrieren</button>
      </div>

      <form>
        <div class="form-group">
          <label>E-Mail</label>
          <input type="email" placeholder="max@beispiel.de" />
        </div>
        <div class="form-group">
          <label>Passwort</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-submit">Anmelden</button>
      </form>

      <div class="divider"></div>
      <button class="demo-link">Demo-Modus ausprobieren →</button>
    </div>

    <div class="footer">Deine Daten werden sicher verarbeitet.</div>
  </div>
</body>
</html>
