name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress run when a new commit is pushed to the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Backend — pytest (unit + integration)
  # ────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt httpx pytest pytest-asyncio

      - name: Run unit tests
        env:
          JWT_SECRET: "ci-test-jwt-secret-key-placeholder-32ch"
          DATABASE_URL: "sqlite:///./ci_test.db"
          APP_ENV: test
          SENTRY_DSN: ""   # Kein Sentry in CI-Tests
        run: pytest tests/unit -v --tb=short

      - name: Run integration tests
        env:
          JWT_SECRET: "ci-test-jwt-secret-key-placeholder-32ch"
          DATABASE_URL: "sqlite:///./ci_test.db"
          APP_ENV: test
          SENTRY_DSN: ""
        run: pytest tests/integration -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Frontend — Vitest + build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest) + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Deploy — only on push to main AND both test jobs green
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Secrets als Env-Vars exponieren — so können sie in if-Conditions geprüft werden
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # ── Docker build & push (optional — DOCKER_USERNAME Secret setzen) ───
      - name: Set up Docker Buildx
        if: env.DOCKER_USERNAME != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Docker image
        if: env.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/intlyst:latest
            ${{ secrets.DOCKER_USERNAME }}/intlyst:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SSH deploy (optional — SSH_HOST Secret setzen) ───────────────────
      - name: Deploy via SSH
        if: env.SSH_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/intlyst
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

      - name: Deployment summary
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ deployed" >> $GITHUB_STEP_SUMMARY
