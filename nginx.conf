# Nginx Configuration for INTLYST Production
# Location: /etc/nginx/sites-available/intlyst
# Enable with: sudo ln -s /etc/nginx/sites-available/intlyst /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;

# Upstream API backend
upstream intlyst_api {
    least_conn;  # Use least connection load balancing
    server api:8000 max_fails=3 fail_timeout=30s;
    # Add more servers for HA:
    # server api2:8000 max_fails=3 fail_timeout=30s;
    # server api3:8000 max_fails=3 fail_timeout=30s;
}

# ════════════════════════════════════════════════════════════
# HTTP Redirect to HTTPS
# ════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name intlyst.example.com www.intlyst.example.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ════════════════════════════════════════════════════════════
# HTTPS API Gateway
# ════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name intlyst.example.com www.intlyst.example.com;

    # ──── SSL/TLS Configuration ────────────────────────
    ssl_certificate /etc/letsencrypt/live/intlyst.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intlyst.example.com/privkey.pem;
    
    # Strong SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ──── Security Headers ──────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ──── CORS Headers ──────────────────────────────────
    add_header Access-Control-Allow-Origin "https://intlyst.example.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Access-Control-Max-Age "86400" always;

    # Handle CORS preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ──── Logging ────────────────────────────────────────
    access_log /var/log/nginx/intlyst_access.log combined buffer=16k;
    error_log /var/log/nginx/intlyst_error.log warn;

    # ──── Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # ──── Caching ────────────────────────────────────────
    # Cache static assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ────────────────────────────────────────────────────
    # API Routes
    # ────────────────────────────────────────────────────

    # Health check endpoint (no rate limiting)
    location / {
        proxy_pass http://intlyst_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # AI Endpoints - Rate limited
    location /api/ai/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://intlyst_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # Cache AI responses for 5 minutes
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
        
        # Longer timeout for AI processing
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Authentication endpoints - Strict rate limiting
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://intlyst_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for auth
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # All other API routes
    location /api/ {
        limit_req zone=general_limit burst=50 nodelay;
        proxy_pass http://intlyst_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Block suspicious requests
    location ~ /\.env {
        deny all;
        return 403;
    }

    location ~ /\.git {
        deny all;
        return 403;
    }

    location ~ /admin {
        deny all;
        return 403;
    }

    # 404 for anything else
    location ~* ^.+\.php$ {
        deny all;
        return 403;
    }
}

# ════════════════════════════════════════════════════════════
# Deployment Instructions
# ════════════════════════════════════════════════════════════
#
# 1. Install Nginx + Let's Encrypt:
#    sudo apt-get install nginx certbot python3-certbot-nginx
#
# 2. Copy this config:
#    sudo cp nginx.conf /etc/nginx/sites-available/intlyst
#    sudo sed -i 's/intlyst.example.com/YOUR_DOMAIN/g' /etc/nginx/sites-available/intlyst
#
# 3. Get SSL certificate:
#    sudo certbot certonly --nginx -d YOUR_DOMAIN
#
# 4. Enable site:
#    sudo ln -s /etc/nginx/sites-available/intlyst /etc/nginx/sites-enabled/
#    sudo rm /etc/nginx/sites-enabled/default  # Disable default site
#
# 5. Test and reload:
#    sudo nginx -t
#    sudo systemctl reload nginx
#
# 6. Monitor:
#    sudo tail -f /var/log/nginx/intlyst_access.log
#    sudo tail -f /var/log/nginx/intlyst_error.log
#
# ════════════════════════════════════════════════════════════
