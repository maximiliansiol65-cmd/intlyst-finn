[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: pure unit tests (no DB, no network)
    integration: tests that hit the real API via TestClient
asyncio_mode = auto
